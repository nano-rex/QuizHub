<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>QuizHub · Search</title><link rel="stylesheet" href="css/styles.css"></head>
<body><main class="shell">
  <nav class="site-nav" aria-label="Main navigation"><a class="brand" href="index.html">QuizHub</a><a href="settings.html">Settings</a><a href="search.html" aria-current="page">Search questions</a></nav>
  <header><p class="eyebrow">QuizHub question library</p><h1>Search questions</h1><p>Find questions across all bundled JSON banks using text, subject, topic, and question type filters.</p></header>
  <section class="panel"><div class="controls"><label>Search text<input id="search-query" type="search" placeholder="Search questions and answers…"></label><label>Language<select id="search-language"><option value="en">English</option><option value="zh-Hans">简体中文</option><option value="zh-Hant">繁體中文</option><option value="ms">Bahasa Melayu</option></select></label><label>Question type<select id="search-type"><option value="">All types</option><option value="multiple-choice">Objective</option><option value="multi-step">Multi-step</option><option value="source-reference">Reference</option></select></label></div>
    <h3>Subjects and topics</h3><div id="search-filters" class="check-grid"><p class="muted">Loading question banks…</p></div><p id="search-status" class="muted" role="status"></p></section>
  <section class="panel"><div id="search-results"></div></section>
</main><script type="module" src="js/search-page.js"></script></body></html>
