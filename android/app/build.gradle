plugins {
    id 'com.android.application'
}

configurations.all {
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

android {
    namespace 'com.nanorex.quizhub'
    compileSdk 34

    defaultConfig {
        applicationId 'com.nanorex.quizhub'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        debug { minifyEnabled false }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

tasks.register('syncQuestionBanks', Sync) {
    from rootProject.file('../question-banks')
    include '*.json'
    into layout.projectDirectory.dir('src/main/assets/question-banks')
}

tasks.named('preBuild').configure { dependsOn tasks.named('syncQuestionBanks') }

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
